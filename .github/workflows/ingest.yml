name: Ingest

on:
  workflow_dispatch:
  schedule:
    # Daily baseline at 06:00 UTC (catches overnight rescheduling, table changes)
    - cron: '0 6 * * *'
    # Weekend match windows: every 15 min, 11:00–22:45 UTC, Sat & Sun
    - cron: '*/15 11-22 * * 0,6'
    # Weekday evenings: every 15 min, 18:00–22:45 UTC, Mon–Fri (covers midweek + Mon/Fri kickoffs)
    - cron: '*/15 18-22 * * 1-5'
    # Post-match stats every 30 min (Fri–Mon only, but global is OK — harmless when no new finishes)
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Ingest football-data.org
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python scripts/ingest_football_data.py

      - name: Ingest Understat (shot-level data for finished matches)
        continue-on-error: true
        run: python scripts/ingest_understat.py

      - name: Ingest API-Football (goals, cards, subs, lineups for finished matches)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/ingest_api_football.py

      # - name: Fit Dixon–Coles model
      #   run: python scripts/model_dixon_coles.py

      - name: Commit refreshed JSON
        run: |
          git config user.name "football-bot"
          git config user.email "football-bot@users.noreply.github.com"
          git add api/ || true
          git diff --staged --quiet || git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
